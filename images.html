<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - Kasi Flavour</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about us.html">About</a>
            <a href="contact us.html">Contact</a>
            <a href="enquiry.html">Enquiry</a>
        </nav>
    </header>

    <h1>Kasi Flavour Image Gallery</h1>
    <div class="gallery">
        <div class="gallery-card" data-caption="Kasi Flavour logo">
            <img src="Pictures/kasi-flavour.png" alt="Kasi Flavour logo" data-full="Pictures/kasi-flavour.png">
            <p>Kasi Flavour</p>
        </div>
        <div class="gallery-card" data-caption="Crispy chips meal">
            <img src="Pictures/chips.jpg" alt="Chips dish" data-full="Pictures/chips.jpg">
            <p>Chips</p>
        </div>
        <div class="gallery-card" data-caption="Traditional pap heal dish">
            <img src="Pictures/pap-heal.jpg" alt="Pap heal dish" data-full="Pictures/pap-heal.jpg">
            <p>Pap Heal</p>
        </div>
        <div class="gallery-card" data-caption="Street kasi kota meal">
            <img src="Pictures/kota.jpg" alt="Kota meal" data-full="Pictures/kota.jpg">
            <p>Kota</p>
        </div>
        <div class="gallery-card" data-caption="Magwinya with mince combo">
            <img src="Pictures/magwinya-mince.png" alt="Magwinya with mince" data-full="Pictures/magwinya-mince.png">
            <p>Magwinya + Mince</p>
        </div>
        <div class="gallery-card" data-caption="Rich mogodu plate">
            <img src="Pictures/mogodu.jpg" alt="Mogodu plate" data-full="Pictures/mogodu.jpg">
            <p>Mogodu</p>
        </div>
        <div class="gallery-card" data-caption="Cold soft drink bottles">
            <img src="Pictures/soft-drink.jpg" alt="Soft drink bottles" data-full="Pictures/soft-drink.jpg">
            <p>Soft Drink</p>
        </div>
        <div class="gallery-card" data-caption="Sweet dessert selection">
            <img src="Pictures/desserts.jpg" alt="Desserts selection" data-full="Pictures/desserts.jpg">
            <p>Desserts</p>
        </div>
        <div class="gallery-card" data-caption="Connect with us on Instagram">
            <img src="Pictures/insta.jpg" alt="Instagram icon" data-full="Pictures/insta.jpg">
            <p>Instagram</p>
        </div>
        <div class="gallery-card" data-caption="Find us on Facebook">
            <img src="Pictures/facebook.png" alt="Facebook icon" data-full="Pictures/facebook.png">
            <p>Facebook</p>
        </div>
        <div class="gallery-card" data-caption="Chat with us on WhatsApp">
            <img src="Pictures/whatsapp.png" alt="WhatsApp icon" data-full="Pictures/whatsapp.png">
            <p>WhatsApp</p>
        </div>
        <div class="gallery-card" data-caption="Follow us on Twitter">
            <img src="Pictures/twitter.png" alt="Twitter icon" data-full="Pictures/twitter.png">
            <p>Twitter</p>
        </div>
    </div>
    <div id="lightbox" class="lightbox" aria-hidden="true">
        <div id="lightbox-content">
            <button id="lightbox-close" aria-label="Close lightbox">×</button>
            <img id="lightbox-image" src="" alt="Expanded gallery image">
            <div id="lightbox-caption"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Kasi Flavour. Here to last. Everyone is welcomed with warm hands.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit an enquiry to Kasi Flavour with our secure, validated form and receive fast feedback from our team.">
    <meta name="keywords" content="enquiry form, Kasi Flavour enquiry, contact form, secure form, food questions">
    <meta name="author" content="Kasi Flavour">
    <title>Enquiry - Kasi Flavour</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about us.html">About</a>
            <a href="contact us.html">Contact</a>
            <a href="enquiry.html">Enquiry</a>
        </nav>
    </header>

    <main>
        <section class="contact-form-section">
            <h1>Enquiry Form</h1>
            <p>Kindly fill in the form below and we will get back to you soon.</p>
            <form id="feedback-form" action="#" method="post">
                <div class="form-field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-field">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-field">
                    <label for="id-number">ID Number</label>
                    <input type="text" id="id-number" name="id-number" required>
                </div>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-field">
                    <label for="enquiry-type">Enquiry Type</label>
                    <select id="enquiry-type" name="enquiry-type" required>
                        <option value="">Choose one</option>
                        <option value="order">Order Question</option>
                        <option value="feedback">Feedback</option>
                        <option value="catering">Catering Request</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <div class="form-field">
                    <input type="checkbox" id="privacy" name="privacy" required>
                    <label for="privacy">I agree to the <a href="privacy-policy.html">Privacy Policy</a></label>
                </div>
                <div class="form-field">
                    <label for="captcha">What is 2 + 2?</label>
                    <input type="text" id="captcha" name="captcha" required>
                </div>
                <button type="submit" class="btn">Submit</button>
                <div id="feedback-feedback" class="form-feedback" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Kasi Flavour. Here to last. Everyone is welcomed with warm hands.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
